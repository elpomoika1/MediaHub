<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .main { max-width: 800px; margin: 0 auto; }
        form { margin-bottom: 40px; }
        input, button { padding: 8px; margin-top: 5px; display: block; }
        .media { display: flex; flex-wrap: wrap; gap: 20px; }
        .media-card { border: 1px solid #ccc; padding: 10px; width: 180px; text-align: center; }
        .media-card img { max-width: 100%; height: auto; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <main class="main">
        <h2>Upload Movie</h2>

        <form id="uploadForm" enctype="multipart/form-data">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" required>

            <label for="type">Type:</label>
            <select id="type" name="type" required>
                <option value="MOVIE">Movie</option>
                <option value="SERIES">Series</option>
                <option value="ANIME">Anime</option>
                <option value="CARTOON">Cartoon</option>
                <option value="TV_SHOW">TV Show</option>
            </select>

            <label for="genre">Genres:</label>
            <select id="genre" name="genre" multiple required>
                <option value="ACTION">Action</option>
                <option value="DRAMA">Drama</option>
                <option value="COMEDY">Comedy</option>
                <option value="HORROR">Horror</option>
                <option value="SCI_FI">Sci-Fi</option>
                <option value="ROMANCE">Romance</option>
                <option value="THRILLER">Thriller</option>
                <option value="FANTASY">Fantasy</option>
            </select>

            <label for="file">Image:</label>
            <input type="file" id="file" name="file" accept="image/*" required>

            <button type="submit">Upload Movie</button>
        </form>

        <h2>All Movies</h2>
        <div class="media" id="moviesContainer">
        </div>
    </main>
<script>
    const form = document.getElementById('uploadForm');
    const moviesContainer = document.getElementById('moviesContainer');

    function renderMovies(media) {
        moviesContainer.innerHTML = '';
        media.forEach(media => {
            const card = document.createElement('div');
            card.className = 'media-card';
            card.innerHTML = `
                <img src="${media.imageUrl}" alt="${media.title}">
                <h3>${media.title}</h3>
                <p>Rating: ${media.rating}</p>
                <p>Votes: ${media.votes}</p>
            `;
            moviesContainer.appendChild(card);
        });
    }

    async function loadMovies() {
        try {
            const res = await fetch('/api/media/list');
            const data = await res.json();
            renderMovies(data);
        } catch (err) {
            console.error('Failed to load media', err);
        }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData();

        const file = document.getElementById('file').files[0];
        const title = document.getElementById('title').value;
        const type = document.getElementById('type').value;

        const genreSelect = document.getElementById('genre');
        const genres = Array.from(genreSelect.selectedOptions).map(o => o.value);

        const data = {
            title: title,
            type: type,
            genres: genres
        };

        formData.append('file', file);
        formData.append('data', new Blob(
            [JSON.stringify(data)],
            { type: 'application/json' }
        ));

        try {
            await fetch('/api/media/upload', {
                method: 'POST',
                body: formData
            });

            form.reset();
            loadMovies();
        } catch (err) {
            console.error('Upload failed', err);
        }
    });

    loadMovies();
</script>
</body>
</html>
